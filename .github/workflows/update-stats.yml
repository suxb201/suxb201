name: Update OSSInsight Stats

on:
  schedule:
    - cron: '23 3 * * *'  # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch OSSInsight images
        run: |
          mkdir -p images
          curl -sSL --retry 3 --max-time 60 \
            "https://next.ossinsight.io/widgets/official/compose-user-dashboard-stats/thumbnail.png?user_id=16659368&image_size=auto&color_scheme=light" \
            -o images/stats-light.png
          curl -sSL --retry 3 --max-time 60 \
            "https://next.ossinsight.io/widgets/official/compose-user-dashboard-stats/thumbnail.png?user_id=16659368&image_size=auto&color_scheme=dark" \
            -o images/stats-dark.png

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update OSSInsight stats images"
          git push
